<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data — QuickTopUp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body data-page-title="Data">
  <div id="mobile-topbar-root"></div>
  <div class="app-shell">
    <div id="sidebar-root"></div>

    <main class="main fade-in">
      <div class="topbar">
        <div>
          <h1 class="page-title">Buy data</h1>
          <p class="page-subtitle">Choose a network variant, then pick a bundle.</p>
        </div>
      </div>

      <div class="grid grid--2" style="align-items: start;">
        <section class="card card--pad">
          <div class="auth-error-banner" id="error-banner" role="alert"></div>

          <label class="field__label" style="margin-bottom: var(--space-2); display:block;">Network</label>
          <div id="network-list" style="display:flex; flex-direction:column; gap: var(--space-2); margin-bottom: var(--space-5);">
            <div class="skeleton" style="height:48px;"></div>
            <div class="skeleton" style="height:48px;"></div>
            <div class="skeleton" style="height:48px;"></div>
          </div>

          <div class="field">
            <label class="field__label" for="phone">Phone number</label>
            <input class="field__input" type="tel" id="phone" name="phone" placeholder="080XXXXXXXX" required pattern="^0\d{10}$" maxlength="11" />
          </div>

          <div class="field" id="plans-field" style="display:none;">
            <label class="field__label">Available bundles</label>
            <div id="plans-list"></div>
          </div>

          <button class="btn btn--primary btn--block" type="submit" form="data-form" id="submit-btn" disabled>Select a network and plan to continue</button>
        </section>

        <aside class="card card--pad">
          <h2 style="font-family: var(--font-display); font-size: var(--text-base); margin-bottom: var(--space-3);">Wallet balance</h2>
          <div style="font-family: var(--font-mono); font-size: var(--text-2xl); font-weight: 600;" id="mini-balance">
            <span class="skeleton" style="display:inline-block;width:120px;height:32px;"></span>
          </div>
          <a href="wallet.html" class="btn btn--secondary btn--block" style="margin-top: var(--space-4);">Fund wallet</a>
        </aside>
      </div>
      <form id="data-form" style="display:none;"></form>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/sidebar.js"></script>
  <script>
    requireAuth();

    let selectedNetwork = null;
    let selectedPlan = null;

    const errorBanner = document.getElementById('error-banner');
    const submitBtn = document.getElementById('submit-btn');
    const plansField = document.getElementById('plans-field');
    const plansList = document.getElementById('plans-list');
    const networkList = document.getElementById('network-list');

    // Confirmed fallback list (PeyFlex "Query Data Networks List"), used only
    // if the live endpoint is unreachable.
    const FALLBACK_NETWORKS = [
      { identifier: 'mtn_gifting_data', name: 'MTN (Gifting)' },
      { identifier: 'mtn_data_share', name: 'MTN (Data Share)' },
      { identifier: 'glo_data', name: 'GLO DATA' },
      { identifier: 'airtel_data', name: 'AIRTEL (Gifting)' },
      { identifier: '9mobile_data', name: '9MOBILE' },
      { identifier: '9mobile_gifting', name: '9MOBILE (Gifting)' },
    ];

    function showError(message) {
      errorBanner.textContent = message;
      errorBanner.classList.add('is-visible');
    }
    function hideError() {
      errorBanner.classList.remove('is-visible');
    }

    function updateSubmitState() {
      const ready = selectedNetwork && selectedPlan;
      submitBtn.disabled = !ready;
      submitBtn.textContent = ready ? `Buy bundle — ₦${formatNaira(selectedPlan.amount)}` : 'Select a network and plan to continue';
    }

    function renderNetworks(networks) {
      networkList.innerHTML = networks.map((net) => `
        <button type="button" class="chip" style="width:100%; text-align:left; justify-content:flex-start;" data-network="${net.identifier}">
          ${net.name}
        </button>
      `).join('');

      networkList.querySelectorAll('[data-network]').forEach((btn) => {
        btn.addEventListener('click', () => {
          networkList.querySelectorAll('.chip').forEach((c) => c.classList.remove('is-selected'));
          btn.classList.add('is-selected');
          selectedNetwork = btn.dataset.network;
          selectedPlan = null;
          updateSubmitState();
          loadPlans(selectedNetwork);
        });
      });
    }

    async function loadNetworks() {
      try {
        const result = await api.getDataNetworks();
        const networks = result.networks?.length ? result.networks : FALLBACK_NETWORKS;
        renderNetworks(networks);
      } catch (err) {
        renderNetworks(FALLBACK_NETWORKS);
      }
    }

    async function loadPlans(network) {
      plansField.style.display = 'block';
      plansList.innerHTML = `<div class="skeleton" style="height:48px; margin-bottom:8px;"></div><div class="skeleton" style="height:48px;"></div>`;
      try {
        const { plans } = await api.getDataPlans(network);
        if (!plans || plans.length === 0) {
          plansList.innerHTML = `<p style="color:var(--text-tertiary); font-size: var(--text-sm);">No bundles available for this network right now.</p>`;
          return;
        }
        plansList.innerHTML = plans.map((plan, i) => `
          <button type="button" class="chip" style="display:flex; justify-content:space-between; width:100%; margin-bottom:8px; text-align:left;" data-plan-index="${i}">
            <span>${plan.label || plan.plan_code}</span>
            <span class="numeric">₦${formatNaira(plan.amount || 0)}</span>
          </button>
        `).join('');

        plansList.querySelectorAll('[data-plan-index]').forEach((btn) => {
          btn.addEventListener('click', () => {
            plansList.querySelectorAll('.chip').forEach((c) => c.classList.remove('is-selected'));
            btn.classList.add('is-selected');
            const plan = plans[Number(btn.dataset.planIndex)];
            selectedPlan = {
              bundleCode: plan.plan_code,
              amount: plan.amount || 0,
            };
            updateSubmitState();
          });
        });
      } catch (err) {
        plansList.innerHTML = `<p style="color:var(--error); font-size: var(--text-sm);">${err.message || 'Could not load bundles for this network.'}</p>`;
      }
    }

    document.getElementById('data-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError();

      const phone = document.getElementById('phone').value.trim();
      if (!/^0\d{10}$/.test(phone)) {
        showError('Enter a valid 11-digit phone number.');
        return;
      }
      if (!selectedNetwork || !selectedPlan) {
        showError('Select a network and bundle to continue.');
        return;
      }

      setButtonLoading(submitBtn, true, 'Processing…');
      try {
        const result = await api.buyData({
          network: selectedNetwork,
          phone,
          bundleCode: selectedPlan.bundleCode,
          amount: selectedPlan.amount,
        });
        showToast(`Data purchase ${result.transaction?.status === 'success' ? 'successful' : 'submitted'}.`, 'success');
        document.getElementById('phone').value = '';
        loadBalance();
      } catch (err) {
        showError(err.message || 'Purchase failed. Please try again.');
      } finally {
        setButtonLoading(submitBtn, false);
        updateSubmitState();
      }
    });

    async function loadBalance() {
      try {
        const wallet = await api.getWallet();
        document.getElementById('mini-balance').textContent = `₦${formatNaira(wallet.balance)}`;
      } catch {
        document.getElementById('mini-balance').textContent = '—';
      }
    }

    loadNetworks();
    loadBalance();
  </script>
</body>
</html>
