<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wallet — QuickTopUp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body data-page-title="Wallet">
  <div id="mobile-topbar-root"></div>
  <div class="app-shell">
    <div id="sidebar-root"></div>

    <main class="main fade-in">
      <div class="topbar">
        <div>
          <h1 class="page-title">Wallet</h1>
          <p class="page-subtitle">Fund your balance to pay for services.</p>
        </div>
      </div>

      <div class="grid grid--2" style="align-items: start;">
        <section class="balance-card">
          <div class="balance-card__label">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
            Current balance
          </div>
          <div class="balance-card__amount" id="balance-amount">
            <sup>₦</sup><span class="skeleton" style="display:inline-block;width:160px;height:40px;"></span>
          </div>
          <div class="charge-bar" id="charge-bar" aria-hidden="true">
            <div class="charge-bar__segment"></div><div class="charge-bar__segment"></div>
            <div class="charge-bar__segment"></div><div class="charge-bar__segment"></div>
            <div class="charge-bar__segment"></div><div class="charge-bar__segment"></div>
            <div class="charge-bar__segment"></div><div class="charge-bar__segment"></div>
          </div>
          <div class="balance-card__meta">
            <span id="last-updated">Updating…</span>
            <span id="currency-label">NGN</span>
          </div>
        </section>

        <section class="card card--pad">
          <h2 style="font-family: var(--font-display); font-size: var(--text-lg); margin-bottom: var(--space-4);">Fund wallet</h2>
          <div class="auth-error-banner" id="error-banner" role="alert"></div>
          <div class="auth-error-banner" id="success-banner" role="status" style="background: var(--accent-bg); border-color: var(--accent-dim); color: var(--accent);"></div>

          <form id="fund-form" novalidate>
            <div class="field">
              <label class="field__label" for="amount">Amount</label>
              <div class="amount-input">
                <span class="amount-input__prefix">₦</span>
                <input class="field__input" type="number" id="amount" name="amount" min="100" step="50" placeholder="0.00" required />
              </div>
              <div class="chip-row" id="chip-row">
                <button type="button" class="chip" data-amount="1000">₦1,000</button>
                <button type="button" class="chip" data-amount="2000">₦2,000</button>
                <button type="button" class="chip" data-amount="5000">₦5,000</button>
                <button type="button" class="chip" data-amount="10000">₦10,000</button>
              </div>
            </div>
            <button class="btn btn--primary btn--block" type="submit" id="submit-btn">Continue to payment</button>
          </form>

          <p style="font-size: var(--text-xs); color: var(--text-tertiary); margin-top: var(--space-4); text-align:center;">
            Payments are processed securely via Paystack. Your wallet is credited automatically once payment is confirmed.
          </p>
        </section>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/sidebar.js"></script>
  <script>
    requireAuth();

    function renderChargeBar(balance) {
      const segments = document.querySelectorAll('#charge-bar .charge-bar__segment');
      const charged = Math.min(8, Math.max(1, Math.ceil((balance / 5000) * 8) || 1));
      segments.forEach((seg, i) => seg.classList.toggle('is-charged', i < charged));
    }

    async function loadWallet() {
      try {
        const wallet = await api.getWallet();
        document.getElementById('balance-amount').innerHTML = `<sup>₦</sup>${formatNaira(wallet.balance)}`;
        document.getElementById('currency-label').textContent = wallet.currency || 'NGN';
        document.getElementById('last-updated').textContent = `Updated ${formatDate(wallet.updatedAt || new Date())}`;
        renderChargeBar(wallet.balance);
      } catch (err) {
        showToast(err.message || 'Could not load wallet balance', 'error');
      }
    }

    const amountInput = document.getElementById('amount');
    document.querySelectorAll('.chip[data-amount]').forEach((chip) => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.chip[data-amount]').forEach((c) => c.classList.remove('is-selected'));
        chip.classList.add('is-selected');
        amountInput.value = chip.dataset.amount;
      });
    });

    const form = document.getElementById('fund-form');
    const errorBanner = document.getElementById('error-banner');
    const successBanner = document.getElementById('success-banner');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBanner.classList.remove('is-visible');
      successBanner.classList.remove('is-visible');

      const amount = Number(amountInput.value);
      if (!amount || amount <= 0) {
        errorBanner.textContent = 'Enter a valid amount to continue.';
        errorBanner.classList.add('is-visible');
        return;
      }

      setButtonLoading(submitBtn, true, 'Preparing payment…');
      try {
        const result = await api.initiateFund(amount);
        if (result.paymentUrl) {
          location.href = result.paymentUrl;
        } else {
          successBanner.textContent = `Payment initiated. Reference: ${result.reference}. Complete payment to credit your wallet.`;
          successBanner.classList.add('is-visible');
        }
      } catch (err) {
        errorBanner.textContent = err.message || 'Could not start payment. Please try again.';
        errorBanner.classList.add('is-visible');
      } finally {
        setButtonLoading(submitBtn, false);
      }
    });

    loadWallet();
  </script>
</body>
</html>
