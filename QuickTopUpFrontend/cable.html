<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cable TV — QuickTopUp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/components.css" />
</head>
<body data-page-title="Cable TV">
  <div id="mobile-topbar-root"></div>
  <div class="app-shell">
    <div id="sidebar-root"></div>

    <main class="main fade-in">
      <div class="topbar">
        <div>
          <h1 class="page-title">Cable TV</h1>
          <p class="page-subtitle">Renew your DStv, GOtv, or Startimes subscription.</p>
        </div>
      </div>

      <div class="grid grid--2" style="align-items: start;">
        <section class="card card--pad">
          <div class="auth-error-banner" id="error-banner" role="alert"></div>
          <div class="auth-error-banner" id="verify-banner" style="background: var(--accent-bg); border-color: var(--accent-dim); color: var(--accent); display:none;"></div>

          <form id="cable-form" novalidate>
            <label class="field__label" style="margin-bottom: var(--space-2); display:block;">Service</label>
            <div class="network-grid" id="service-grid" style="grid-template-columns: repeat(3, 1fr);">
              <button type="button" class="network-option" data-service="dstv">
                <span class="network-option__badge" style="background:#003C7E;">DS</span>
                <span class="network-option__name">DStv</span>
              </button>
              <button type="button" class="network-option" data-service="gotv">
                <span class="network-option__badge" style="background:#00A859;">GO</span>
                <span class="network-option__name">GOtv</span>
              </button>
              <button type="button" class="network-option" data-service="startimes">
                <span class="network-option__badge" style="background:#E4002B;">ST</span>
                <span class="network-option__name">Startimes</span>
              </button>
            </div>

            <div class="field">
              <label class="field__label" for="smartcard">Smartcard / IUC number</label>
              <input class="field__input" type="text" id="smartcard" name="smartcard" placeholder="e.g. 1234567890" required />
            </div>

            <button class="btn btn--secondary btn--block" type="button" id="verify-btn" style="margin-bottom: var(--space-4);">Verify IUC number</button>

            <div class="field">
              <label class="field__label" for="package">Plan</label>
              <input class="field__input" type="text" id="package" name="package" placeholder="e.g. nova, padi, compact (PeyFlex plan code)" required />
              <span class="field__error" style="color: var(--text-tertiary);">
                Enter the exact PeyFlex plan code for this provider (check "List Cable Plan Codes" in your PeyFlex dashboard).
              </span>
            </div>

            <div class="field">
              <label class="field__label" for="phone">Phone number</label>
              <input class="field__input" type="tel" id="phone" name="phone" placeholder="080XXXXXXXX" required pattern="^0\d{10}$" maxlength="11" />
            </div>

            <div class="field">
              <label class="field__label" for="amount">Amount</label>
              <div class="amount-input">
                <span class="amount-input__prefix">₦</span>
                <input class="field__input" type="number" id="amount" name="amount" min="100" step="50" placeholder="0.00" required />
              </div>
            </div>

            <button class="btn btn--primary btn--block" type="submit" id="submit-btn" disabled>Verify IUC to continue</button>
          </form>
        </section>

        <aside class="card card--pad">
          <h2 style="font-family: var(--font-display); font-size: var(--text-base); margin-bottom: var(--space-3);">Wallet balance</h2>
          <div style="font-family: var(--font-mono); font-size: var(--text-2xl); font-weight: 600;" id="mini-balance">
            <span class="skeleton" style="display:inline-block;width:120px;height:32px;"></span>
          </div>
          <a href="wallet.html" class="btn btn--secondary btn--block" style="margin-top: var(--space-4);">Fund wallet</a>
        </aside>
      </div>
    </main>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/sidebar.js"></script>
  <script>
    requireAuth();

    let selectedService = null;
    let iucVerified = false;

    const submitBtn = document.getElementById('submit-btn');
    const verifyBtn = document.getElementById('verify-btn');
    const verifyBanner = document.getElementById('verify-banner');
    const errorBanner = document.getElementById('error-banner');
    const smartcardInput = document.getElementById('smartcard');

    function resetVerification() {
      iucVerified = false;
      verifyBanner.style.display = 'none';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Verify IUC to continue';
    }

    document.querySelectorAll('.network-option').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.network-option').forEach((b) => b.classList.remove('is-selected'));
        btn.classList.add('is-selected');
        selectedService = btn.dataset.service;
        resetVerification();
      });
    });

    smartcardInput.addEventListener('input', resetVerification);

    verifyBtn.addEventListener('click', async () => {
      errorBanner.classList.remove('is-visible');
      const iuc = smartcardInput.value.trim();

      if (!selectedService) {
        errorBanner.textContent = 'Select a cable provider first.';
        errorBanner.classList.add('is-visible');
        return;
      }
      if (!iuc) {
        errorBanner.textContent = 'Enter your smartcard / IUC number first.';
        errorBanner.classList.add('is-visible');
        return;
      }

      setButtonLoading(verifyBtn, true, 'Verifying…');
      try {
        const result = await api.validateCustomer({
          service: 'cable',
          smartcardNumber: iuc,
          provider: selectedService,
        });
        if (result.status === 'SUCCESS') {
          verifyBanner.textContent = `IUC verified${result.customer_name && result.customer_name !== 'UNKNOWN' ? `: ${result.customer_name}` : ''}.`;
          verifyBanner.style.display = 'block';
          iucVerified = true;
          submitBtn.disabled = false;
          submitBtn.textContent = 'Subscribe';
        } else {
          throw new Error(result.message || 'Could not verify this IUC number.');
        }
      } catch (err) {
        errorBanner.textContent = err.message || 'Could not verify this IUC number.';
        errorBanner.classList.add('is-visible');
        resetVerification();
      } finally {
        setButtonLoading(verifyBtn, false);
      }
    });

    async function loadBalance() {
      try {
        const wallet = await api.getWallet();
        document.getElementById('mini-balance').textContent = `₦${formatNaira(wallet.balance)}`;
      } catch {
        document.getElementById('mini-balance').textContent = '—';
      }
    }

    const form = document.getElementById('cable-form');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBanner.classList.remove('is-visible');

      const smartcardNumber = smartcardInput.value.trim();
      const packageCode = document.getElementById('package').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const amount = Number(document.getElementById('amount').value);

      if (!iucVerified) {
        errorBanner.textContent = 'Verify your IUC number before subscribing.';
        errorBanner.classList.add('is-visible');
        return;
      }
      if (!packageCode) {
        errorBanner.textContent = 'Enter the plan code.';
        errorBanner.classList.add('is-visible');
        return;
      }
      if (!/^0\d{10}$/.test(phone)) {
        errorBanner.textContent = 'Enter a valid 11-digit phone number.';
        errorBanner.classList.add('is-visible');
        return;
      }
      if (!amount || amount <= 0) {
        errorBanner.textContent = 'Enter a valid amount.';
        errorBanner.classList.add('is-visible');
        return;
      }

      setButtonLoading(submitBtn, true, 'Processing…');
      try {
        const result = await api.buyCable({ service: selectedService, smartcardNumber, packageCode, phone, amount });
        showToast(`Cable subscription ${result.transaction?.status === 'success' ? 'successful' : 'submitted'}.`, 'success');
        form.reset();
        document.querySelectorAll('.network-option').forEach((el) => el.classList.remove('is-selected'));
        selectedService = null;
        resetVerification();
        loadBalance();
      } catch (err) {
        errorBanner.textContent = err.message || 'Subscription failed. Please try again.';
        errorBanner.classList.add('is-visible');
      } finally {
        setButtonLoading(submitBtn, false);
      }
    });

    loadBalance();
  </script>
</body>
</html>
